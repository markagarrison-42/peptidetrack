<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PeptideTrack has moved</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f7f7f5;
      color: #111110;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e8e8e4;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }

    .icon {
      font-size: 2.5rem;
      margin-bottom: 1.5rem;
    }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.6875rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #a8a8a2;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 0.9375rem;
      line-height: 1.7;
      color: #6b6b66;
      margin-bottom: 2rem;
    }

    .new-url {
      font-family: 'DM Mono', monospace;
      font-size: 0.875rem;
      color: #2563eb;
      background: #eff4ff;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 2rem;
      display: block;
    }

    .btn {
      display: block;
      background: #111110;
      color: #ffffff;
      text-decoration: none;
      font-size: 0.9375rem;
      font-weight: 500;
      padding: 0.875rem 2rem;
      border-radius: 8px;
      transition: background 0.15s ease;
    }

    .btn:hover {
      background: #2563eb;
    }

    .footer-note {
      margin-top: 2rem;
      font-size: 0.8125rem;
      color: #a8a8a2;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">💊</div>
    <p class="eyebrow">PeptideTrack</p>
    <h1>We've moved</h1>
    <p>PeptideTrack has a new home. Update your bookmark to keep tracking your protocols.</p>
    <span class="new-url">protocol.mg42apps.com</span>
    <a class="btn" href="https://protocol.mg42apps.com">Go to the new address →</a>
    <p class="footer-note">This page will remain here for a while so existing links keep working.</p>
  </div>
</body>
</html>
